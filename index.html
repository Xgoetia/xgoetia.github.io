<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XGOETIA // CORE_OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent: #00ff9d;
            --accent-glow: rgba(0, 255, 157, 0.3);
            --surface: #0a0a0c;
            --border: rgba(255, 255, 255, 0.05);
            --text-dim: #888;
            --text-bright: #fff;
            --font-display: 'Orbitron', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-bright);
            font-family: var(--font-mono);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* BACKGROUND EFFECTS */
        #noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .glow-sphere {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -2;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* NAVIGATION */
        nav {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 0.5rem;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.4; transform: scale(0.8); }
        }

        /* HERO SECTION */
        header {
            padding: 10rem 1rem 4rem;
            text-align: center;
            position: relative;
        }

        .glitch-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 12vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 1.5rem;
            position: relative;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .subtitle {
            color: var(--text-dim);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            letter-spacing: 1px;
            padding: 0 1rem;
        }

        /* APP GRID SYSTEM */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .category-section {
            margin-bottom: 4rem;
            cursor: grab;
        }

        .category-section:active {
            cursor: grabbing;
        }

        .sortable-ghost {
            opacity: 0.3;
            transform: scale(0.98);
            border: 1px dashed var(--accent);
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1.5rem;
        }

        .category-title {
            font-family: var(--font-display);
            font-size: clamp(0.6rem, 2vw, 0.8rem);
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .line {
            height: 1px;
            flex-grow: 1;
            background: linear-gradient(90deg, var(--accent-glow), transparent);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
        }

        .app-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, var(--accent-glow), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .app-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
        }

        @media (hover: none) {
            .app-card:hover {
                transform: none;
                box-shadow: none;
            }
        }

        .app-card:hover::before {
            transform: translateX(100%);
        }

        .app-icon {
            width: 40px;
            height: 40px;
            background: #151518;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: grayscale(1) brightness(1.5);
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .app-card:hover .app-icon {
            filter: grayscale(0) brightness(1);
            transform: scale(1.1);
        }

        .app-info {
            flex-grow: 1;
            min-width: 0;
        }

        .app-name {
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-tag {
            font-size: 0.55rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .checkbox-custom {
            width: 18px;
            height: 18px;
            border: 1px solid var(--border);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .app-card.selected {
            border-color: var(--accent);
            background: rgba(0, 255, 157, 0.05);
        }

        .app-card.selected .checkbox-custom {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        /* FOOTER ACTION */
        .action-bar {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 0.8rem 1.5rem;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: auto;
            max-width: 95vw;
        }

        .counter {
            font-family: var(--font-display);
            font-size: 0.7rem;
            color: var(--accent);
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            padding: 0.7rem 1.5rem;
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 50px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        @media (max-width: 768px) {
            nav { padding: 1.5rem 1rem; }
            .logo { font-size: 1.1rem; letter-spacing: 0.3rem; }
            .status-indicator span { font-size: 0.6rem; }
            header { padding-top: 6rem; padding-bottom: 2rem; }
            .category-section { margin-bottom: 3rem; }
            .action-bar { padding: 0.6rem 1.2rem; gap: 1rem; }
            .btn-primary { padding: 0.6rem 1rem; font-size: 0.65rem; }
        }

        @media (max-width: 480px) {
            .app-grid { grid-template-columns: 1fr; }
            .glitch-title { letter-spacing: -1px; }
        }
    </style>
</head>
<body>
    <div id="noise-overlay"></div>
    <div class="grid-bg"></div>
    <div class="glow-sphere" id="mouse-glow"></div>

    <nav>
        <div class="logo">XGOETIA</div>
        <div class="status-indicator">
            <div class="dot"></div>
            <span>System Online // Core v2.0</span>
        </div>
    </nav>

    <header>
        <p class="subtitle">DİJİTAL ARŞİVLER SENKRONİZE EDİLİDİ. BOŞLUK, SEÇİMLERİNİ YUTMAYA HAZIR. PROTOKOLÜ BAŞLAT VEYA ANALOG GÖLGELERDE KALMAYA DEVAM ET. // CORE_OS INITIALIZED.</p>
    </header>

    <main class="container" id="app-container">
        <!-- App categories will be injected here -->
    </main>

    <div class="action-bar">
        <div class="counter">SELECTED: <span id="selection-count">00</span></div>
        <button class="btn-primary" id="deploy-btn">Initialize Deployment</button>
    </div>

    <script>
        const appsData = {
            "INTERNET_BROWSERS": [
                { name: "Chrome", id: "Google.Chrome" }, { name: "Brave", id: "BraveSoftware.BraveBrowser" },
                { name: "Firefox", id: "Mozilla.Firefox" }, { name: "Edge", id: "Microsoft.Edge" },
                { name: "Opera", id: "Opera.Opera" }, { name: "Vivaldi", id: "VivaldiTechnologies.Vivaldi" },
                { name: "Tor Browser", id: "TorProject.TorBrowser" }, { name: "Chromium", id: "Eloston.UngoogledChromium" }
            ],
            "COMMUNICATION_CHANNELS": [
                { name: "Discord", id: "Discord.Discord" }, { name: "Telegram", id: "Telegram.TelegramDesktop" },
                { name: "WhatsApp", id: "WhatsApp.WhatsApp" }, { name: "Slack", id: "SlackTechnologies.Slack" },
                { name: "Zoom", id: "Zoom.Zoom" }, { name: "Teams", id: "Microsoft.Teams" },
                { name: "Skype", id: "Microsoft.Skype" }, { name: "Signal", id: "OpenWhisperSystems.Signal" }
            ],
            "DEVELOPMENT_TOOLS": [
                { name: "VS Code", id: "Microsoft.VisualStudioCode" }, { name: "Visual Studio 2022", id: "Microsoft.VisualStudio.2022.Community" },
                { name: "Git", id: "Git.Git" }, { name: "Node.js", id: "OpenJS.NodeJS" },
                { name: "Python", id: "Python.Python.3" }, { name: "Docker", id: "Docker.DockerDesktop" },
                { name: "Postman", id: "Postman.Postman" }, { name: "IntelliJ IDEA", id: "JetBrains.IntelliJIDEA.Community" },
                { name: "Notepad++", id: "Notepad++.Notepad++" }, { name: "Sublime Text", id: "SublimeHQ.SublimeText.4" }
            ],
            "MEDIA_ENTERTAINMENT": [
                { name: "Spotify", id: "Spotify.Spotify" }, { name: "VLC Player", id: "VideoLAN.VLC" },
                { name: "OBS Studio", id: "OBSProject.OBSStudio" }, { name: "Audacity", id: "Audacity.Audacity" },
                { name: "GIMP", id: "GIMP.GIMP" }, { name: "Blender", id: "BlenderFoundation.Blender" },
                { name: "Handbrake", id: "HandBrake.HandBrake" }, { name: "iTunes", id: "Apple.iTunes" }
            ],
            "CLOUD_STORAGE_FILES": [
                { name: "Dropbox", id: "Dropbox.Dropbox" }, { name: "OneDrive", id: "Microsoft.OneDrive" },
                { name: "Google Drive", id: "Google.GoogleDrive" }, { name: "Mega Sync", id: "Mega.MEGAsync" },
                { name: "qBittorrent", id: "qBittorrent.qBittorrent" }, { name: "FileZilla", id: "FileZilla.FileZilla" },
                { name: "WinRAR", id: "RARLab.WinRAR" }, { name: "7-Zip", id: "7zip.7zip" }
            ],
            "SECURITY_PRIVACY": [
                { name: "Malwarebytes", id: "Malwarebytes.Malwarebytes" }, { name: "NordVPN", id: "NordSecurity.NordVPN" },
                { name: "ExpressVPN", id: "ExpressVPN.ExpressVPN" }, { name: "ProtonVPN", id: "ProtonTechnologies.ProtonVPN" },
                { name: "Kaspersky", id: "Kaspersky.Kaspersky" }, { name: "Avast", id: "Avast.AvastFreeAntivirus" }
            ],
            "OFFICE_PRODUCTIVITY": [
                { name: "LibreOffice", id: "LibreOffice.LibreOffice" }, { name: "WPS Office", id: "Kingsoft.WPSOffice" },
                { name: "Notion", id: "Notion.Notion" }, { name: "Evernote", id: "Evernote.Evernote" },
                { name: "Obsidian", id: "Obsidian.Obsidian" }, { name: "Adobe Reader", id: "Adobe.AdobeAcrobatReaderDC.Turkish" }
            ],
            "GAMING_PLATFORMS": [
                { name: "Steam", id: "Valve.Steam" }, { name: "Epic Games", id: "EpicGames.EpicGamesLauncher" },
                { name: "Battle.net", id: "Blizzard.BattleNet" }, { name: "EA Desktop", id: "ElectronicArts.EADesktop" },
                { name: "GOG Galaxy", id: "GOG.Galaxy" }, { name: "Twitch", id: "Twitch.Twitch" }
            ],
            "SYSTEM_UTILITIES": [
                { name: "PowerToys", id: "Microsoft.PowerToys" }, { name: "Everything", id: "voidtools.Everything" },
                { name: "Rufus", id: "Akeo.Rufus" }, { name: "CCleaner", id: "Piriform.CCleaner" },
                { name: "HWMonitor", id: "CPUID.HWMonitor" }, { name: "CPU-Z", id: "CPUID.CPU-Z" },
                { name: "GPU-Z", id: "TechPowerUp.GPU-Z" }, { name: "CrystalDiskInfo", id: "CrystalDewWorld.CrystalDiskInfo" },
                { name: "AnyDesk", id: "AnyDeskSoftwareGmbH.AnyDesk" }, { name: "TeamViewer", id: "TeamViewer.TeamViewer" }
            ],
            "AI_CORE": [
                { name: "ChatGPT", id: "OpenAI.ChatGPT" }, { name: "Claude", id: "Anthropic.Claude" },
                { name: "Gemini", id: "Google.Gemini" }, { name: "Perplexity", id: "Perplexity.Perplexity" },
                { name: "Stable Diffusion", id: "StabilityAI.StableDiffusion" }, { name: "Copilot", id: "Microsoft.Copilot" }
            ]
        };

        const container = document.getElementById('app-container');
        const selectedApps = new Set();
        const glow = document.getElementById('mouse-glow');

        // MOUSE GLOW EFFECT
        document.addEventListener('mousemove', (e) => {
            glow.style.left = (e.clientX - 300) + 'px';
            glow.style.top = (e.clientY - 300) + 'px';
        });

        // RENDER APPS
        Object.entries(appsData).forEach(([cat, apps]) => {
            const section = document.createElement('div');
            section.className = 'category-section';
            
            section.innerHTML = `
                <div class="category-header">
                    <h2 class="category-title">${cat}</h2>
                    <div class="line"></div>
                </div>
                <div class="app-grid">
                    ${apps.map(app => `
                        <div class="app-card" onclick="toggleApp(this, '${app.name}', '${app.id}')">
                            <div class="app-icon">
                                <img src="https://www.google.com/s2/favicons?sz=64&domain=${app.name.toLowerCase().replace(/\s/g, '')}.com" width="24" height="24" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%2300ff9d%22><path d=%22M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5%22/></svg>'">
                            </div>
                            <div class="app-info">
                                <div class="app-name">${app.name}</div>
                                <div class="app-tag">${app.id.split('.')[0]}</div>
                            </div>
                            <div class="checkbox-custom"></div>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(section);
        });

        function toggleApp(el, name, id) {
            if (selectedApps.has(id)) {
                selectedApps.delete(id);
                el.classList.remove('selected');
            } else {
                selectedApps.add(id);
                el.classList.add('selected');
            }
            updateCounter();
        }

        function updateCounter() {
            const count = selectedApps.size;
            document.getElementById('selection-count').innerText = count.toString().padStart(2, '0');
        }

        document.getElementById('deploy-btn').onclick = () => {
            if (selectedApps.size === 0) return alert("NO PACKAGES SELECTED FOR DEPLOYMENT.");
            
            let script = "@echo off\r\n";
            script += "echo [SYSTEM] INITIALIZING DEPLOYMENT SEQUENCE...\r\n";
            script += "color 0a\r\n";
            
            selectedApps.forEach(id => {
                script += `echo [PROCESS] INSTALLING: ${id}...\r\n`;
                script += `winget install --id "${id}" --silent --accept-package-agreements --accept-source-agreements --force\r\n`;
            });
            
            script += "echo [COMPLETE] DEPLOYMENT SEQUENCE FINISHED.\r\n";
            script += "pause";

            const blob = new Blob([script], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "deployment_v2.cmd";
            a.click();
        };

        // INITIALIZE SORTABLE
        new Sortable(container, {
            animation: 350,
            ghostClass: 'sortable-ghost',
            handle: '.category-header'
        });
    </script>
</body>
</html>
