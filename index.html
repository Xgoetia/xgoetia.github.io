<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Xgoetia | Portfolio</title>
    <style>
        body { margin: 0; background: #fff; color: #1a1a1a; font-family: 'Inter', sans-serif; overflow: hidden; perspective: 1500px; cursor: none !important; }
        * { cursor: none !important; }
        /* Magic Orb Cursor UI */
        .custom-cursor { position: fixed; width: 25px; height: 25px; pointer-events: none; z-index: 9999; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff 0%, rgba(255,255,255,0.4) 20%, transparent 60%); box-shadow: 0 0 15px var(--rgb-color), inset 0 0 10px var(--rgb-color); animation: orb-pulse 2s infinite ease-in-out; }
        
        .cursor-energy { position: absolute; width: 100%; height: 100%; border-radius: 50%; filter: blur(4px); opacity: 0.7; background: conic-gradient(from 0deg, transparent, var(--rgb-color), transparent, var(--rgb-color), transparent); animation: energy-spin var(--cursor-speed, 4s) infinite linear; }
        
        .cursor-internal-ring { position: absolute; width: 70%; height: 70%; border: 2px dashed #ff4500; border-radius: 50%; box-shadow: 0 0 10px #ff4500; animation: energy-spin var(--cursor-speed, 4s) infinite linear; opacity: 0.8; }
        
        .magic-spark { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; box-shadow: 0 0 5px #fff; opacity: 0; animation: spark-float 1.5s infinite linear; }

        @keyframes orb-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px var(--rgb-color); }
            50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 35px var(--rgb-color); }
        }
        
        @keyframes energy-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        @keyframes spark-float {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }
        
        @keyframes rgb-cycle {
            0%, 100% { --rgb-color: #ff4500; }
            33% { --rgb-color: #7a00ff; }
            66% { --rgb-color: #00d4ff; }
        }
        #hero { height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; position: relative; z-index: 5; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .sidebar-menu { position: fixed; top: 50%; left: 40px; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 15px; align-items: flex-start; }
        .nav-link { position: relative; padding: 12px 25px; color: rgba(0,0,0,0.4); text-decoration: none; font-family: "Courier New", monospace; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); border-left: 3px solid rgba(0,0,0,0.05); background: rgba(0,0,0,0.01); cursor: pointer; overflow: hidden; }
        .nav-link:hover, .nav-link.active { color: #000; border-left-color: #ff4500; background: linear-gradient(270deg, transparent, rgba(255,69,0,0.05)); padding-left: 45px; text-shadow: 0 0 10px rgba(255,69,0,0.2); }
        .nav-link::after { content: ""; position: absolute; left: -3px; top: 0; height: 0; width: 3px; background: #ff4500; transition: height 0.3s ease; }
        .nav-link:hover::after, .nav-link.active::after { height: 100%; }
        .nav-link .link-id { font-size: 9px; color: #ff4500; margin-right: 15px; opacity: 0.6; font-weight: bold; transition: all 0.4s; }
        .nav-link:hover .link-id, .nav-link.active .link-id { opacity: 1; transform: scale(1.2); }

        .page-content { position: absolute; top: 100px; right: 5%; width: 45%; max-width: 800px; max-height: 80vh; overflow-y: auto; color: #1a1a1a; padding: 40px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255, 69, 0, 0.1); border-radius: 16px; z-index: 20; display: none; opacity: 0; transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 20px 50px rgba(0,0,0,0.02); cursor: move; user-select: none; transform-style: preserve-3d; transform: translateX(100px) rotateY(-30deg) translateZ(-200px); }
        .page-content.active { display: block; opacity: 1; transform: translateX(0) rotateY(0deg) translateZ(0); }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #ff4500; }
        
        .lang-switch { position: fixed; bottom: 30px; right: 30px; z-index: 100; display: flex; gap: 15px; font-family: monospace; font-size: 12px; letter-spacing: 2px; }
        
        /* Pro Tools UI Styles */
        .pro-tool-container { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
        .pro-tool-card { background: rgba(255, 69, 0, 0.05); border: 1px solid rgba(255, 69, 0, 0.2); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .pro-tool-card h3 { margin: 0 0 10px 0; color: #ff4500; font-family: monospace; font-size: 16px; }
        .pro-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); margin-bottom: 10px; font-family: inherit; }
        .pro-btn { background: #ff4500; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .pro-btn:hover { background: #e30a17; transform: translateY(-2px); }
        .status-badge { display: inline-block; padding: 2px 8px; background: #ff4500; color: #fff; font-size: 9px; border-radius: 4px; margin-bottom: 5px; }

        /* Web3 UI Styles */
        #web3-connect { position: fixed; top: 20px; right: 20px; background: #ff4500; color: #fff; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 1100; box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3); transition: all 0.3s; font-size: 12px; }
        #web3-connect:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 69, 0, 0.5); }
        .crypto-card { background: linear-gradient(135deg, #ff4500, #ff8800); color: #fff; padding: 20px; border-radius: 12px; margin-top: 20px; box-shadow: 0 10px 30px rgba(255, 69, 0, 0.2); }
        .crypto-addr { font-family: monospace; font-size: 10px; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 4px; word-break: break-all; }
        
        .lang-link { cursor: pointer; color: rgba(0, 0, 0, 0.4); transition: all 0.3s ease; text-decoration: none; }
        .lang-link.active { color: #000; font-weight: bold; }
        
        #content-area h1 { color: #ff4500; font-family: monospace; border-bottom: 2px solid #ff4500; padding-bottom: 10px; }
        #content-area p { line-height: 1.6; color: #333; }
        
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; display: flex; justify-content: center; align-items: center; font-family: monospace; color: #ff4500; }

        /* Code Stream UI (Left Side) */
        #code-stream { position: fixed; top: 0; left: 0; width: 300px; height: 100vh; pointer-events: none; z-index: 10; overflow: hidden; opacity: 0; transition: opacity 0.5s ease; font-family: 'Courier New', monospace; font-size: 11px; color: #ff4500; line-height: 1.5; padding: 20px; white-space: pre; background: linear-gradient(90deg, rgba(255,69,0,0.03), transparent); }
        #code-stream.active { opacity: 0.3; }
        @keyframes scroll-code-vertical { from { transform: translateY(0); } to { transform: translateY(-50%); } }
        #code-inner { display: flex; flex-direction: column; animation: scroll-code-vertical 40s linear infinite; }
        #code-stream:not(.active) #code-inner { animation-play-state: paused; }
        #code-stream.active #code-inner { animation-play-state: running; }

        .terminal-cursor { display: inline-block; width: 8px; background: #ff4500; margin-left: 5px; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="loading" class="loading-screen">INITIALIZING SYSTEM...</div>
    
    <button id="web3-connect">Connect Wallet</button>
    
    <div class="lang-switch">
        <span class="lang-link active" data-lang="TR">TR</span>
        <span style="color:rgba(0,0,0,0.2)">|</span>
        <span class="lang-link" data-lang="EN">EN</span>
        <span style="color:rgba(0,0,0,0.2)">|</span>
        <span class="lang-link" data-lang="RU">RU</span>
    </div>
    
        <div id="code-stream"><div id="code-inner"></div></div>

    <div id="page-content" class="page-content">
        <div class="close-btn" id="close-btn">✕</div>
        <div id="content-area"></div>
    </div>
    
    <div class="custom-cursor" id="cursor">
        <div class="cursor-energy"></div>
        <div class="cursor-internal-ring"></div>
        <div class="magic-spark" style="--dx:15px; --dy:-20px; animation-delay: 0.1s;"></div>
        <div class="magic-spark" style="--dx:-18px; --dy:15px; animation-delay: 0.4s;"></div>
        <div class="magic-spark" style="--dx:20px; --dy:20px; animation-delay: 0.7s;"></div>
        <div class="magic-spark" style="--dx:-15px; --dy:-15px; animation-delay: 1.1s;"></div>
    </div>
    
    <div class="sidebar-menu">
        <a href="#overview" class="nav-link" data-page="overview"><span class="link-id">01</span> OVERVIEW</a>
        <a href="#projects" class="nav-link" data-page="projects"><span class="link-id">02</span> PROJECTS</a>
        <a href="#profile" class="nav-link" data-page="profile"><span class="link-id">03</span> PROFILE</a>
        <a href="#tools" class="nav-link" data-page="tools"><span class="link-id">04</span> PRO TOOLS</a>
        <a href="#connect" class="nav-link" data-page="connect"><span class="link-id">05</span> CONNECT</a>
    </div>

    <div id="hero"><canvas id="particleCanvas"></canvas></div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script type="module">
        import init, { TextParticleSystem, ImageProcessor } from './pkg/my_wasm_project.js';

        async function run() {
            try {
                const wasm = await init();
                const memory = wasm.memory;
                document.getElementById('loading').style.display = 'none';

                // --- 1. CONFIG & STATE ---
                let currentLang = 'TR';
                const menuTranslations = {
                    'TR': { overview: 'GİRİŞ', projects: 'PROJELER', profile: 'PROFİL', tools: 'PRO ARAÇLAR', connect: 'İLETİŞİM' },
                    'EN': { overview: 'OVERVIEW', projects: 'PROJECTS', profile: 'PROFILE', tools: 'PRO TOOLS', connect: 'CONNECT' },
                    'RU': { overview: 'ОБЗОР', projects: 'ПРОЕКТЫ', profile: 'ПРОФИЛЬ', tools: 'ПРО-ИНСТРУМЕНТЫ', connect: 'СВЯЗЬ' }
                };

                const canvas = document.getElementById('particleCanvas');
                const ctx = canvas.getContext('2d');
                const pageContent = document.getElementById('page-content');
                const contentArea = document.getElementById('content-area');
                const codeStream = document.getElementById('code-stream');
                const codeInner = document.getElementById('code-inner');
                const cursor = document.getElementById('cursor');
                const internalRing = document.querySelector('.cursor-internal-ring');
                const energySwirl = document.querySelector('.cursor-energy');

                let currentRotationSpeed = 4.0; // Base speed (slow)
                const minSpeed = 0.2; // Max speed (lowest duration)
                const baseSpeed = 4.0;

                window.addEventListener('wheel', (e) => {
                    // Update direction
                    if (e.deltaY > 0) {
                        internalRing.style.animationDirection = 'normal';
                        energySwirl.style.animationDirection = 'reverse';
                    } else {
                        internalRing.style.animationDirection = 'reverse';
                        energySwirl.style.animationDirection = 'normal';
                    }

                    // Dynamic speed boost
                    const boost = Math.abs(e.deltaY) * 0.005;
                    currentRotationSpeed = Math.max(minSpeed, currentRotationSpeed - boost);
                });

                // Friction logic to slow down back to base speed
                function updateRotationPhysics() {
                    if (currentRotationSpeed < baseSpeed) {
                        currentRotationSpeed += 0.05; // Slow down effect
                    }
                    if (currentRotationSpeed > baseSpeed) currentRotationSpeed = baseSpeed;
                    
                    document.documentElement.style.setProperty('--cursor-speed', currentRotationSpeed + 's');
                    requestAnimationFrame(updateRotationPhysics);
                }
                updateRotationPhysics();

                const web3Btn = document.getElementById('web3-connect');

                // Web3 Wallet Logic (Enhanced)
                async function connectWallet() {
                    if (typeof window.ethereum !== 'undefined') {
                        try {
                            const provider = new ethers.providers.Web3Provider(window.ethereum);
                            await provider.send("eth_requestAccounts", []);
                            const signer = provider.getSigner();
                            const address = await signer.getAddress();
                            const balance = await provider.getBalance(address);
                            const ethBalance = ethers.utils.formatEther(balance);

                            web3Btn.innerHTML = `<span>${address.substring(0,6)}...${address.substring(38)}</span> <br> <span style="font-size:10px; opacity:0.8;">${parseFloat(ethBalance).toFixed(4)} ETH</span>`;
                            web3Btn.style.background = '#4CAF50';
                            addMsg(`Sistem Bağlandı. Adres: ${address}`, 'bot');

                            // Listen for account changes
                            window.ethereum.on('accountsChanged', (accounts) => {
                                if (accounts.length === 0) {
                                    web3Btn.textContent = 'Connect Wallet';
                                    web3Btn.style.background = '#ff4500';
                                    addMsg("Cüzdan bağlantısı kesildi.", "bot");
                                } else {
                                    connectWallet();
                                }
                            });

                        } catch (err) {
                            console.error(err);
                            addMsg("Cüzdan bağlantısı sırasında bir hata oluştu.", "bot");
                        }
                    } else {
                        addMsg("MetaMask yüklü değil. Lütfen bir kripto cüzdanı kurun.", "bot");
                        window.open('https://metamask.io/download/', '_blank');
                    }
                }
                web3Btn.onclick = connectWallet;

                window.addEventListener('mousedown', (e) => {
                    cursor.classList.add('active');
                    setTimeout(() => cursor.classList.remove('active'), 100);
                });

                function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
                window.addEventListener('resize', resize);
                resize();

                const system = new TextParticleSystem();
                let mouseX = -1000, mouseY = -1000;
                window.addEventListener('mousemove', (e) => {
                    mouseX = e.clientX; mouseY = e.clientY;
                    cursor.style.left = mouseX + 'px'; cursor.style.top = mouseY + 'px';
                });

                function getPoints(text, size) {
                    const tc = document.createElement('canvas'); const tx = tc.getContext('2d');
                    tc.width = window.innerWidth; tc.height = window.innerHeight;
                    tx.font = `bold ${size}px Inter, sans-serif`; tx.fillStyle = 'white'; tx.textAlign = 'center'; tx.textBaseline = 'middle';
                    tx.fillText(text, tc.width / 2, tc.height / 2);
                    const d = tx.getImageData(0, 0, tc.width, tc.height).data; const pts = [];
                    for (let y = 0; y < tc.height; y += 4) { for (let x = 0; x < tc.width; x += 4) { if (d[(y * tc.width + x) * 4 + 3] > 128) pts.push({ x, y }); } }
                    return pts;
                }

                const initialPoints = getPoints("XGOETIA", Math.min(window.innerWidth / 6, 150));
                let activeParticleCount = initialPoints.length;
                initialPoints.forEach(p => system.add_particle(Math.random() * canvas.width, Math.random() * canvas.height, p.x, p.y));

                const rustCodeContent = `use wasm_bindgen::prelude::*;
#[wasm_bindgen]
pub struct TextParticleSystem {
    xs: Vec<f64>, ys: Vec<f64>,
    target_xs: Vec<f64>, target_ys: Vec<f64>,
    vxs: Vec<f64>, vys: Vec<f64>, radii: Vec<f64>,
}
#[wasm_bindgen]
impl TextParticleSystem {
    pub fn update(&mut self, m_x: f64, m_y: f64, r: f64, rx: f64, ry: f64, rw: f64, rh: f64) {
        for i in 0..self.xs.len() {
            let dx = m_x - self.xs[i];
            let dy = m_y - self.ys[i];
            let dist = (dx*dx + dy*dy).sqrt();
            if dist < r {
                self.vxs[i] -= dx / dist * 5.0;
                self.vys[i] -= dy / dist * 5.0;
            }
            let t_dx = self.target_xs[i] - self.xs[i];
            let t_dy = self.target_ys[i] - self.ys[i];
            self.vxs[i] += t_dx * 0.15;
            self.vys[i] += t_dy * 0.15;
        }
    }
}`;
                codeInner.textContent = (rustCodeContent + "\n").repeat(50);

                // --- 2. LOGIC FUNCTIONS ---
                function updateMenuText() {
                    document.querySelectorAll('.nav-link').forEach(link => {
                        const page = link.dataset.page;
                        const text = menuTranslations[currentLang][page];
                        const idNode = link.querySelector('.link-id');
                        if (idNode) link.innerHTML = `${idNode.outerHTML} ${text}`;
                    });
                }

                function updateText(newText) {
                    const newPoints = getPoints(newText.toUpperCase(), Math.min(window.innerWidth / 8, 100));
                    const currentCount = system.get_count();
                    const targetXs = new Float64Array(memory.buffer, system.get_target_xs_ptr(), currentCount);
                    const targetYs = new Float64Array(memory.buffer, system.get_target_ys_ptr(), currentCount);
                    activeParticleCount = newPoints.length;
                    for (let i = 0; i < currentCount; i++) {
                        if (i < newPoints.length) { targetXs[i] = newPoints[i].x; targetYs[i] = newPoints[i].y; }
                        else { targetXs[i] = -1000; targetYs[i] = -1000; }
                    }
                    if (newPoints.length > currentCount) {
                        for (let i = currentCount; i < newPoints.length; i++) system.add_particle(Math.random() * canvas.width, Math.random() * canvas.height, newPoints[i].x, newPoints[i].y);
                    }
                }

                function typeWriter(element, html, speed = 2) {
                    element.innerHTML = ''; let i = 0, isTag = false, currentHtml = '';
                    function type() {
                        if (i < html.length) {
                            let char = html.charAt(i); if (char === '<') isTag = true; if (char === '>') isTag = false;
                            currentHtml += char; element.innerHTML = currentHtml + '<span class="terminal-cursor">_</span>';
                            i++; if (isTag) type(); else setTimeout(type, speed);
                        } else { element.innerHTML = html; }
                    }
                    type();
                }

                async function loadPage(page) {
                    if (page === 'tools') {
                        updateText(page);
                        pageContent.style.display = 'block'; setTimeout(() => pageContent.classList.add('active'), 10);
                        const toolsHtml = `
                            <h1 style="color:#ff4500; border-bottom: 2px solid #ff4500; padding-bottom:10px;">PRO SERVICE DASHBOARD</h1>
                            <div class="pro-tool-container">
                                <div class="pro-tool-card">
                                    <span class="status-badge">WASM POWERED</span>
                                    <h3>WASM IMAGE OPTIMIZER</h3>
                                    <p style="font-size:13px; color:#666;">Yüksek hızlı, yerel görsel sıkıştırma. Verileriniz asla sunucuya gitmez.</p>
                                    <input type="file" id="img-upload" class="pro-input" accept="image/*">
                                    <div id="img-result" style="display:none; margin:10px 0; font-size:12px; color:#4CAF50;"></div>
                                    <button class="pro-btn" onclick="window.optimizeImage()">OPTIMIZE IMAGE (FREE)</button>
                                </div>
                                
                                <div class="pro-tool-card">
                                    <span class="status-badge">MARKETING AI</span>
                                    <h3>SEO & META ANALYZER</h3>
                                    <p style="font-size:13px; color:#666;">Herhangi bir URL'nin meta verilerini, hızını ve SEO skorunu anında analiz edin.</p>
                                    <input type="text" id="url-input" class="pro-input" placeholder="https://example.com">
                                    <div id="seo-result" style="display:none; margin:10px 0; font-size:12px; border-top:1px solid #ddd; padding-top:10px;"></div>
                                    <button class="pro-btn" onclick="window.analyzeSEO()">START ANALYSIS</button>
                                </div>

                                <div style="margin-top:20px; padding:20px; background: rgba(255,69,0,0.05); border: 2px solid #ff4500; border-radius: 12px;">
                                    <h3 style="color:#ff4500; margin:0 0 15px 0;">💳 UNLOCK PREMIUM (START EARNING!)</h3>
                                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px;">
                                        <div style="padding:10px; background:#fff; border-radius:8px; text-align:center;">
                                            <div style="font-size:20px; font-weight:bold; color:#ff4500;">FREE</div>
                                            <div style="font-size:11px; color:#666;">5 images/mo</div>
                                            <div style="font-size:11px; color:#666;">Watermark ON</div>
                                        </div>
                                        <div style="padding:10px; background:#ff4500; border-radius:8px; text-align:center; color:#fff;">
                                            <div style="font-size:20px; font-weight:bold;">PRO</div>
                                            <div style="font-size:11px; opacity:0.9;">$9 / month</div>
                                            <div style="font-size:11px; opacity:0.9;">Unlimited</div>
                                        </div>
                                        <div style="padding:10px; background:#000; border-radius:8px; text-align:center; color:#fff;">
                                            <div style="font-size:20px; font-weight:bold;">BIZ</div>
                                            <div style="font-size:11px; opacity:0.9;">$29 / month</div>
                                            <div style="font-size:11px; opacity:0.9;">API Access</div>
                                        </div>
                                    </div>
                                    <button class="pro-btn" style="background:#ff4500; margin-bottom:10px;" onclick="window.subscribe('pro')">⬆️ UPGRADE TO PRO ($9/mo)</button>
                                    <button class="pro-btn" style="background:#000;" onclick="window.subscribe('business')">🚀 GO BUSINESS ($29/mo)</button>
                                    <div style="font-size:11px; color:#666; margin-top:10px; text-align:center;">Secure payments via Stripe / PayTR</div>
                                </div>
                            </div>
                        `;
                        contentArea.innerHTML = toolsHtml;
                        return;
                    }

                    let fileName = page.charAt(0).toUpperCase() + page.slice(1);
                    if (currentLang === 'EN') fileName += '_EN'; else if (currentLang === 'RU') fileName += '_RU';
                    let ext = (page === 'projects') ? '.json' : (page === 'profile' ? '.ts' : (page === 'connect' ? '.sh' : '.md'));
                    try {
                        updateText(page);
                        const res = await fetch(fileName + ext); const text = await res.text();
                        pageContent.style.display = 'block'; setTimeout(() => pageContent.classList.add('active'), 10);
                        let finalHtml = "";
                        if (ext === '.json') {
                            const data = JSON.parse(text);
                            finalHtml = `<h1 style="color:#ff4500; border-bottom: 2px solid #ff4500; padding-bottom:10px;">${data.author || 'PROJECTS'}</h1>`;
                            data.projects.forEach(p => finalHtml += `<div style="margin-bottom: 30px;"><h3 style="color:#000; margin: 20px 0 5px 0; font-family: monospace;">> ${p.name.toUpperCase()}</h3><p style="color:#333; margin: 0; line-height: 1.6; font-size: 14px;">${p.description}</p><small style="color:#ff4500; font-family: monospace; opacity: 0.8; font-weight: bold;">[ ${p.tech.join(' | ')} ]</small></div>`);
                        } else finalHtml = `<pre style="white-space:pre-wrap; font-family:monospace; color:#333;">${text}</pre>`;
                        typeWriter(contentArea, finalHtml);
                    } catch (e) { contentArea.innerHTML = `<h1>Hata</h1><p>Dosya bulunamadı.</p>`; }
                }

                // --- 3. EVENT LISTENERS ---
                document.querySelectorAll('.nav-link').forEach(link => {
                    link.onclick = () => {
                        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                        link.classList.add('active'); loadPage(link.dataset.page);
                    };
                    link.onmouseenter = () => { codeStream.classList.add('active'); };
                    link.onmouseleave = () => { codeStream.classList.remove('active'); };
                });

                document.getElementById('close-btn').onclick = () => {
                    pageContent.classList.remove('active'); setTimeout(() => pageContent.style.display = 'none', 800);
                    updateText("XGOETIA"); document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                };

                document.querySelectorAll('.lang-link').forEach(link => link.onclick = () => {
                    document.querySelectorAll('.lang-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active'); currentLang = link.dataset.lang;
                    
                    updateMenuText();
                    const activeLink = document.querySelector('.nav-link.active');
                    if (activeLink && pageContent.classList.contains('active')) loadPage(activeLink.dataset.page);
                });

                // PRO TOOLS FUNCTIONS
                window.optimizeImage = async function() {
                    const input = document.getElementById('img-upload');
                    const result = document.getElementById('img-result');
                    if (!input.files[0]) return alert("Lütfen bir görsel seçin!");
                    
                    // Ödeme kontrolü (DEMO: Her zaman false, gerçekte localStorage'dan kontrol edilecek)
                    const isPro = localStorage.getItem('wasm_pro_user') === 'true';
                    
                    result.style.display = 'block';
                    result.innerHTML = "🚀 WASM Engine Processing... ⚙️";
                    
                    try {
                        const file = input.files[0];
                        const originalSize = (file.size / 1024).toFixed(2);
                        const arrayBuffer = await file.arrayBuffer();
                        const imageData = new Uint8Array(arrayBuffer);
                        
                        // WASM ile görüntüyü yeniden boyutlandır (Örnek: 800x600)
                        const resized = ImageProcessor.resize_image(imageData, 800, 600, 'webp');
                        
                        const optimizedSize = (resized.length / 1024).toFixed(2);
                        const gain = ((1 - resized.length / file.size) * 100).toFixed(1);
                        
                        // İndirme bağlantısı oluştur
                        const blob = new Blob([resized], { type: 'image/webp' });
                        const url = URL.createObjectURL(blob);
                        
                        if (!isPro) {
                            result.innerHTML = `✅ BAŞARILI!<br>Orijinal: ${originalSize} KB<br>Optimize Edilmiş: ${optimizedSize} KB<br><strong>Kazanç: %${gain}</strong><br><br><span style="color:#ff4500; font-size:11px;">⬆️ Daha fazla özellik için yukarıdan PRO'ya geçin!</span>`;
                        } else {
                            result.innerHTML = `✅ BAŞARILI! (PRO USER)<br>Orijinal: ${originalSize} KB<br>Optimize Edilmiş: ${optimizedSize} KB<br><strong>Kazanç: %${gain}</strong><br><a href="${url}" download="optimized_${file.name.split('.')[0]}.webp" style="color:#4CAF50; font-weight:bold;">[ İNDİR ]</a>`;
                        }
                    } catch (err) {
                        result.innerHTML = `❌ Hata: ${err}`;
                        console.error(err);
                    }
                };

                // Ödeme fonksiyonu (Stripe entegrasyonu hazır)
                window.subscribe = function(plan) {
                    const prices = {
                        'pro': { stripe: 'price_1234567890', paytr: 'PRO_PLAN_ID' },
                        'business': { stripe: 'price_0987654321', paytr: 'BIZ_PLAN_ID' }
                    };
                    
                    // Seçim: Stripe veya PayTR (Türkiye için PayTR önerilir)
                    const usePayTR = confirm('Türkiye\'den misiniz? (Evet: PayTR, Hayır: Stripe)');
                    
                    if (usePayTR) {
                        // PayTR entegrasyonu (iframe veya yönlendirme)
                        alert('PayTR ödeme sayfasına yönlendiriliyorsunuz...\nPlan: ' + plan.toUpperCase() + '\nTutar: ' + (plan === 'pro' ? '299 TL' : '699 TL') + '/ay');
                        // Gerçek entegrasyonda: window.location.href = 'https://www.paytr.com/xxx'
                        localStorage.setItem('wasm_pro_user', 'true'); // DEMO: Ödeme başarılı kabul edildi
                        alert('✅ Ödeme Başarılı! Artık PRO özellikleri kullanabilirsiniz.');
                    } else {
                        // Stripe Checkout
                        alert('Stripe Checkout açılıyor...\nPlan: ' + plan.toUpperCase() + '\nTutar: $' + (plan === 'pro' ? '9' : '29') + '/mo');
                        // Gerçek entegrasyonda: 
                        // const stripe = Stripe('pk_test_xxx');
                        // stripe.redirectToCheckout({ lineItems: [{price: prices[plan].stripe, quantity: 1}] });
                        localStorage.setItem('wasm_pro_user', 'true'); // DEMO: Ödeme başarılı kabul edildi
                        alert('✅ Payment Successful! You can now use PRO features.');
                    }
                };

                window.analyzeSEO = function() {
                    const url = document.getElementById('url-input').value;
                    const result = document.getElementById('seo-result');
                    if (!url) return alert("Lütfen bir URL girin!");
                    
                    result.style.display = 'block';
                    result.innerHTML = "🔍 Analiz Motoru Çalışıyor... (DEMO)";
                    
                    setTimeout(() => {
                        result.innerHTML = `
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
                                <div><strong>Hız:</strong> 0.8s (A+)</div>
                                <div><strong>SEO Skoru:</strong> %94</div>
                                <div><strong>SSL:</strong> Güvenli</div>
                                <div><strong>Mobil:</strong> Uyumlu</div>
                            </div>
                            <p style="margin-top:10px; font-size:11px; color:#ff4500;">* Tavsiye: H1 etiketleri optimize edilmeli.</p>
                            <div style="font-size:11px; color:#666; margin-top:10px; padding:10px; background:rgba(255,69,0,0.05); border-radius:6px;">
                                💡 <strong>PRO Özellik:</strong> Tam SEO raporu, rekabet analizi ve anahtar kelime önerileri için yukarıdan PRO'ya geçin!
                            </div>
                        `;
                    }, 2000);
                };

                let isDragging = false, dx, dy;
                pageContent.onmousedown = (e) => { if (e.target.closest('a') || e.target.closest('button') || e.target.id === 'close-btn') return; isDragging = true; dx = e.clientX - pageContent.offsetLeft; dy = e.clientY - pageContent.offsetTop; pageContent.style.transition = 'none'; };
                window.onmousemove = (e) => { if (isDragging) { pageContent.style.right = 'auto'; pageContent.style.left = (e.clientX - dx) + 'px'; pageContent.style.top = (e.clientY - dy) + 'px'; pageContent.style.transform = 'none'; } };
                window.onmouseup = () => { isDragging = false; pageContent.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)'; };

                // --- 4. ANIMATION LOOP ---
                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    let rx = 0.0, ry = 0.0, rw = 0.0, rh = 0.0;
                    if (pageContent.classList.contains('active')) { const rect = pageContent.getBoundingClientRect(); rx = parseFloat(rect.left); ry = parseFloat(rect.top); rw = parseFloat(rect.width); rh = parseFloat(rect.height); }
                    try { system.update(mouseX, mouseY, 100.0, rx, ry, rw, rh); } catch(e) {}
                    const count = system.get_count();
                    const xs = new Float64Array(memory.buffer, system.get_xs_ptr(), count);
                    const ys = new Float64Array(memory.buffer, system.get_ys_ptr(), count);
                    const rs = new Float64Array(memory.buffer, system.get_radii_ptr(), count);
                    ctx.fillStyle = '#ff4500';
                    for (let i = 0; i < activeParticleCount; i++) {
                        ctx.beginPath(); ctx.arc(xs[i], ys[i], rs[i], 0, Math.PI * 2); ctx.fill();
                    }
                    requestAnimationFrame(animate);
                }
                animate();
                updateMenuText();
            } catch (e) { console.error(e); }
        }
        run();
    </script>
</body>
