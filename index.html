            try {

                const memory = wasm.memory;
                document.getElementById('loading').style.display = 'none';

                // --- 1. CONFIG & STATE ---

                    'EN': { overview: 'OVERVIEW', projects: 'PROJECTS', profile: 'PROFILE', tools: 'PRO TOOLS', bundler: 'APP BUNDLER', connect: 'CONNECT' },
                    'RU': { overview: 'ОБЗОР', projects: 'ПРОЕКТЫ', profile: 'ПРОФИЛЬ', tools: 'ПРО-ИНСТРУМЕНТЫ', bundler: 'СБОРЩИК', connect: 'СВЯЗЬ' }
                };

                const canvas = document.getElementById('particleCanvas');
                const ctx = canvas.getContext('2d');
                const pageContent = document.getElementById('page-content');
                const contentArea = document.getElementById('content-area');
                const codeStream = document.getElementById('code-stream');
                const codeInner = document.getElementById('code-inner');
                const cursor = document.getElementById('cursor');
                const internalRing = document.querySelector('.cursor-internal-ring');
                const energySwirl = document.querySelector('.cursor-energy');

                let currentRotationSpeed = 4.0; // Base speed (slow)
                const minSpeed = 0.2; // Max speed (lowest duration)
                const baseSpeed = 4.0;

                window.addEventListener('wheel', (e) => {
                    // Update direction
                    if (e.deltaY > 0) {
                        internalRing.style.animationDirection = 'normal';
                        energySwirl.style.animationDirection = 'reverse';
                    } else {
                        internalRing.style.animationDirection = 'reverse';
                        energySwirl.style.animationDirection = 'normal';
                    }

                    // Dynamic speed boost
                    const boost = Math.abs(e.deltaY) * 0.005;
                    currentRotationSpeed = Math.max(minSpeed, currentRotationSpeed - boost);
                });

                // Friction logic to slow down back to base speed
                function updateRotationPhysics() {
                    if (currentRotationSpeed < baseSpeed) {
                        currentRotationSpeed += 0.05; // Slow down effect
                    }
                    if (currentRotationSpeed > baseSpeed) currentRotationSpeed = baseSpeed;
                    
                    document.documentElement.style.setProperty('--cursor-speed', currentRotationSpeed + 's');
                    requestAnimationFrame(updateRotationPhysics);
                }
                updateRotationPhysics();

                window.addEventListener('mousedown', (e) => {
                    cursor.classList.add('active');
                    setTimeout(() => cursor.classList.remove('active'), 100);
                });

                function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
                window.addEventListener('resize', resize);
                resize();

                const system = new TextParticleSystem();
                let mouseX = -1000, mouseY = -1000;
                window.addEventListener('mousemove', (e) => {
                    mouseX = e.clientX; mouseY = e.clientY;

                });

                function getPoints(text, size) {
                    const tc = document.createElement('canvas'); const tx = tc.getContext('2d');

                    tx.font = `bold ${size}px Inter, sans-serif`; tx.fillStyle = 'white'; tx.textAlign = 'center'; tx.textBaseline = 'middle';
                    tx.fillText(text, tc.width / 2, tc.height / 2);
                    const d = tx.getImageData(0, 0, tc.width, tc.height).data; const pts = [];
                    for (let y = 0; y < tc.height; y += 4) { for (let x = 0; x < tc.width; x += 4) { if (d[(y * tc.width + x) * 4 + 3] > 128) pts.push({ x, y }); } }
                    return pts;
                }

                const initialPoints = getPoints("XGOETIA", Math.min(window.innerWidth / 6, 150));
                let activeParticleCount = initialPoints.length;

                const rustCodeContent = `use wasm_bindgen::prelude::*;
#[wasm_bindgen]
pub struct TextParticleSystem {
    xs: Vec<f64>, ys: Vec<f64>,
    target_xs: Vec<f64>, target_ys: Vec<f64>,
    vxs: Vec<f64>, vys: Vec<f64>, radii: Vec<f64>,
}
#[wasm_bindgen]
impl TextParticleSystem {
    pub fn update(&mut self, m_x: f64, m_y: f64, r: f64, rx: f64, ry: f64, rw: f64, rh: f64) {
        for i in 0..self.xs.len() {
            let dx = m_x - self.xs[i];
            let dy = m_y - self.ys[i];
            let dist = (dx*dx + dy*dy).sqrt();
            if dist < r {
                self.vxs[i] -= dx / dist * 5.0;
                self.vys[i] -= dy / dist * 5.0;
            }
            let t_dx = self.target_xs[i] - self.xs[i];
            let t_dy = self.target_ys[i] - self.ys[i];
            self.vxs[i] += t_dx * 0.15;
            self.vys[i] += t_dy * 0.15;
        }
    }
}`;
                codeInner.textContent = (rustCodeContent + "\n").repeat(50);

                        systemCreated = false;

                        // Animasyonu yeniden başlat
                        animationRunning = true;
                        requestAnimationFrame(animate);

                    element.innerHTML = ''; let i = 0, isTag = false, currentHtml = '';
                    function type() {
                        if (i < html.length) {

                    type();

                                    <input type="file" id="img-upload" class="pro-input" accept="image/*">

                            { name: 'Java JDK', category: 'Language', urls: { lts: 'https://download.oracle.com/java/21/latest/jdk-21_windows-x64_bin.exe', stable: 'https://download.oracle.com/java/17/latest/jdk-17_windows-x64_bin.exe' } },
                            { name: 'MySQL', category: 'Database', urls: { stable: 'https://dev.mysql.com/get/Downloads/MySQL-8.0/mysql-8.0.36-winx64.msi' } },
                            { name: 'PostgreSQL', category: 'Database', urls: { stable: 'https://get.enterprisedb.com/postgresql/postgresql-16.1-1-windows-x64.exe' } },
                            { name: 'MongoDB', category: 'Database', urls: { stable: 'https://fastdl.mongodb.org/windows/mongodb-windows-x86_64-7.0.5-signed.msi' } },
                            { name: 'Docker Desktop', category: 'DevOps', urls: { stable: 'https://desktop.docker.com/win/main/amd64/149282/Docker%20Desktop%20Installer.exe' } },
                            { name: 'Terraform', category: 'DevOps', urls: { stable: 'https://releases.hashicorp.com/terraform/1.7.3/terraform_1.7.3_windows_amd64.zip' } },
                            { name: 'Kubernetes CLI', category: 'DevOps', urls: { stable: 'https://dl.k8s.io/release/v1.29.2/bin/windows/amd64/kubectl.exe' } },
                            { name: 'VirtualBox', category: 'Virtualization', urls: { stable: 'https://download.virtualbox.org/virtualbox/7.0.14/VirtualBox-7.0.14-161095-Win.exe' } },
                            { name: 'GIMP', category: 'Design', urls: { stable: 'https://download.gimp.org/mirror/pub/gimp/v2.10/windows/gimp-2.10.36-setup-1.exe' } },
                            { name: 'Discord', category: 'Communication', urls: { stable: 'https://discord.com/api/download?platform=win' } },
                            { name: 'WinRAR', category: 'Utility', urls: { stable: 'https://www.rarlab.com/rar/winrar-x64-701.exe' } },
                            { name: 'PowerToys', category: 'Utility', urls: { stable: 'https://github.com/microsoft/PowerToys/releases/download/v0.77.0/PowerToysSetup-0.77.0-x64.exe' } }
                        ];
                        const apps = window.appsData;

                        const presets = {
                            'Web Developer': ['VS Code', 'Node.js', 'Git', 'Chrome', 'Firefox', 'Postman', 'DBeaver'],
                            'DevOps Pro': ['Docker Desktop', 'Kubernetes CLI', 'Terraform', 'Helm', 'Jenkins', 'Git', 'Python'],
                            'Data Scientist': ['Python', 'MySQL', 'PostgreSQL', 'Jupyter', 'VS Code', 'Git'],
                            'Full Stack': ['VS Code', 'Node.js', 'Git', 'Docker Desktop', 'MongoDB', 'Postman', 'Chrome']
                        };

                        let appsHtml = apps.filter(app => !app.hidden).map((app, idx) => {
                            const hasVersion = app.urls.stable ? true : false;
                            const versionOptions = hasVersion ? `
                                <select id="version-${idx}" style="font-size:9px; padding:2px; margin-left:8px; border-radius:4px; border:1px solid rgba(255,69,0,0.3); background:rgba(255,69,0,0.05); color:#ff4500;">
                                    ${app.urls.stable ? '<option value="stable">Stable</option>' : ''}
                                    ${app.urls.lts ? '<option value="lts">LTS</option>' : ''}
                                    ${app.urls.beta ? '<option value="beta">Beta</option>' : ''}
                                    ${app.urls.current ? '<option value="current">Current</option>' : ''}
                                </select>` : '';
                            
                            return `
                            <div class="app-item" style="display:flex; align-items:center; padding:10px; margin-bottom:8px; background:rgba(255,69,0,0.05); border-radius:8px; border:1px solid rgba(255,69,0,0.1);">
                                <input type="checkbox" id="app-${idx}" data-idx="${idx}" data-name="${app.name}" data-category="${app.category}" data-license="${app.license || 'free'}" data-size="${app.size || 0}" data-deps="${(app.deps || []).join(',')}" style="margin-right:15px; transform:scale(1.3); cursor:pointer;">
                                <div style="flex:1;">
                                    <strong style="color:#000; font-family:monospace;">${app.name}</strong>
                                    <span style="color:#ff4500; font-size:10px; margin-left:10px; padding:2px 6px; background:rgba(255,69,0,0.1); border-radius:4px;">${app.category}</span>
                                    ${versionOptions}
                                    <label style="font-size:9px; margin-left:8px; cursor:pointer;">
                                        <input type="checkbox" class="silent-check" data-idx="${idx}" style="margin-right:3px;"> Silent
                                    </label>
                                    ${app.license === 'paid' ? '<span style="color:#ff4500; font-size:9px; margin-left:5px;">⚠️ PAID</span>' : ''}
                                    <span style="color:#666; font-size:9px; margin-left:5px;">${app.size || 0} MB</span>
                                </div>
                            </div>
                        `}).join('');

                        const presetsHtml = Object.entries(presets).map(([name, appList]) => `
                            <button style="background:rgba(255,69,0,0.1); color:#ff4500; border:1px solid rgba(255,69,0,0.3); margin:2px; font-size:10px; padding:4px 8px; border-radius:6px; backdrop-filter:blur(5px); transition:all 0.3s; cursor:pointer;" onmouseover="this.style.background='rgba(255,69,0,0.2)'" onmouseout="this.style.background='rgba(255,69,0,0.1)'" onclick="window.applyPreset('${name}')">${name}</button>
                        `).join('');

                        const bundlerHtml = `
                            <h1 style="color:#ff4500; border-bottom: 2px solid #ff4500; padding-bottom:10px;">🚀 APP BUNDLER</h1>
                            <p style="color:#333; margin-bottom:20px; line-height:1.6;">Favori uygulamalarınızı seçin ve tek tıkla kurulum paketi oluşturun.</p>
                            
                            <div class="pro-tool-card" style="margin-bottom:15px; background:rgba(255,69,0,0.08);">
                                <h3 style="margin:0 0 10px 0; font-size:14px;">⚡ HAZIR PAKETLER</h3>
                                <div style="display:flex; flex-wrap:wrap; gap:5px;">
                                    ${presetsHtml}
                                </div>
                            </div>
                            
                            <div class="pro-tool-card" style="margin-bottom:20px;">
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                    <h3 style="margin:0;">Uygulama Seçimi</h3>
                                    <div style="text-align:right;">
                                        <span id="selected-count" style="color:#ff4500; font-family:monospace; font-weight:bold; display:block;">0 SEÇİLDİ</span>
                                        <span id="disk-space" style="color:#666; font-size:10px;">0 MB</span>
                                    </div>
                                </div>
                                <div id="warnings" style="margin-bottom:10px;"></div>
                            <div id="apps-list" style="max-height:300px; overflow-y:auto; margin-bottom:15px;">
                                    ${appsHtml}
                                </div>
                                <button style="background:rgba(255,69,0,0.1); color:#ff4500; border:1px solid rgba(255,69,0,0.3); margin-bottom:10px; font-size:10px; padding:4px 8px; border-radius:6px; backdrop-filter:blur(5px); transition:all 0.3s; cursor:pointer;" onmouseover="this.style.background='rgba(255,69,0,0.2)'" onmouseout="this.style.background='rgba(255,69,0,0.1)'" onclick="window.generateBundleScript()">📦 PAKET OLUŞTUR</button>
                                <button style="background:rgba(255,69,0,0.1); color:#ff4500; border:1px solid rgba(255,69,0,0.3); margin-right:5px; font-size:10px; padding:4px 8px; border-radius:6px; backdrop-filter:blur(5px); transition:all 0.3s; cursor:pointer;" onmouseover="this.style.background='rgba(255,69,0,0.2)'" onmouseout="this.style.background='rgba(255,69,0,0.1)'" onclick="window.selectAllApps(true)">Tümünü Seç</button>
                                <button style="background:rgba(255,69,0,0.1); color:#ff4500; border:1px solid rgba(255,69,0,0.3); font-size:10px; padding:4px 8px; border-radius:6px; backdrop-filter:blur(5px); transition:all 0.3s; cursor:pointer;" onmouseover="this.style.background='rgba(255,69,0,0.2)'" onmouseout="this.style.background='rgba(255,69,0,0.1)'" onclick="window.selectAllApps(false)">Temizle</button>
                            </div>
                            <div id="bundle-output" style="display:none; margin-top:15px; padding:15px; background:rgba(0,0,0,0.05); border-radius:8px; font-family:monospace; font-size:12px; color:#333;"></div>
                        `;
                        contentArea.innerHTML = bundlerHtml;

                        // Make updateSelection available globally
                window.updateSelection = updateSelection;
                        window.applyPreset = function(presetName) {
                            const presetApps = presets[presetName];
                            if (!presetApps) return;
                            document.querySelectorAll('#apps-list input[type="checkbox"]').forEach(cb => cb.checked = false);
                            presetApps.forEach(appName => {
                                const cb = document.querySelector(`#apps-list input[data-name="${appName}"]`);
                                if (cb) cb.checked = true;
                            });
                            updateSelection();
                        };

                        function updateSelection() {
                            const checkboxes = document.querySelectorAll('#apps-list input[type="checkbox"]');
                            let totalSize = 0;
                            let warnings = [];
                            let selectedCategories = {};
                            
                            // Bağımlılık kontrolü (nested dependencies için döngü)
                            let depsChanged = true;
                            while (depsChanged) {
                                depsChanged = false;
                                checkboxes.forEach(cb => {
                                    if (cb.checked) {
                                        const deps = cb.dataset.deps ? cb.dataset.deps.split(',') : [];
                                        deps.forEach(depName => {
                                            if (depName) {
                                                const depCb = document.querySelector(`#apps-list input[data-name="${depName}"]`);
                                                if (depCb && !depCb.checked) {
                                                    depCb.checked = true;
                                                    depsChanged = true;
                                                    warnings.push(`✓ ${depName} otomatik eklendi (${cb.dataset.name} bağımlılığı)`);
                                                }
                                            }
                                        });
                                    }
                                });
                            }
                            
                            // Hesaplama ve çakışma kontrolü
                            checkboxes.forEach(cb => {
                                if (cb.checked) {
                                    totalSize += parseInt(cb.dataset.size) || 0;
                                    const cat = cb.dataset.category;
                                    if (cat) {
                                        if (!selectedCategories[cat]) selectedCategories[cat] = [];
                                        selectedCategories[cat].push(cb.dataset.name);
                                    }
                                }
                            });
                            
                            // Editör çakışması uyarısı
                            Object.entries(selectedCategories).forEach(([cat, names]) => {
                                if (cat === 'Editor' && names.length > 1) {
                                    warnings.push(`⚠️ UYARI: ${names.join(' ve ')} aynı kategoride (${cat}). Sadece birini seçmeniz önerilir.`);
                                }
                            });
                            
                            // Lisans kontrolü
                            checkboxes.forEach(cb => {
                                if (cb.checked && cb.dataset.license === 'paid') {
                                    warnings.push(`💰 BİLGİ: ${cb.dataset.name} ücretli bir uygulamadır.`);
                                }
                            });
                            
                            // UI güncelleme
                            const count = document.querySelectorAll('#apps-list input[type="checkbox"]:checked').length;
                            document.getElementById('selected-count').textContent = count + ' SEÇİLDİ';
                            document.getElementById('disk-space').textContent = totalSize + ' MB';
                            
                            // Disk alanı kontrolü (gerçek)
                            // checkRealDiskSpace removed - not defined
                            
                            const warningsDiv = document.getElementById('warnings');
                            if (warnings.length > 0) {
                                warningsDiv.innerHTML = warnings.map(w => `
                                    <div style="
                                        background: rgba(255,69,0,0.1);
                                        border-left: 3px solid #ff4500;
                                        padding: 8px 12px;
                                        margin: 5px 0;
                                        border-radius: 4px;
                                        animation: warningPulse 0.5s ease-in-out;
                                        font-size: 12px;
                                    ">${w}</div>
                                `).join('');
                                warningsDiv.style.display = 'block';
                            } else {
                                warningsDiv.style.display = 'none';
                            }
                        }

                        // Event listeners
                        const checkboxes = document.querySelectorAll('#apps-list input[type="checkbox"]');
                        checkboxes.forEach(cb => {
                            cb.addEventListener('change', () => {
                                updateSelection();
                            });
                        });
                        updateSelection(); // ilk hesaplama
                        return;
                    }

                    let fileName = page.charAt(0).toUpperCase() + page.slice(1);
                    if (currentLang === 'EN') fileName += '_EN';
                    else if (currentLang === 'RU') fileName += '_RU';
                    else if (currentLang === 'TR') fileName += '_TR';
                    let ext = (page === 'projects') ? '.json' : (page === 'profile' ? '.ts' : (page === 'connect' ? '.sh' : '.md'));
                    try {
                        updateText(page);
                        const res = await fetch(fileName + ext); const text = await res.text();
                        pageContent.style.display = 'block'; setTimeout(() => pageContent.classList.add('active'), 10);
                        let finalHtml = "";
                        if (ext === '.json') {
                            const data = JSON.parse(text);
                            finalHtml = `<h1 style="color:#ff4500; border-bottom: 2px solid #ff4500; padding-bottom:10px;">${data.author || 'PROJECTS'}</h1>`;
                            data.projects.forEach(p => {
                                let buttonsHtml = '';
                                if (p.online_app) buttonsHtml += `<button onclick="window.openApp('${p.online_app}', '${p.name}')" style="display:inline-block; margin-right:10px; margin-top:10px; padding:8px 16px; background:#ff4500; color:#fff; text-decoration:none; border:none; border-radius:6px; font-size:12px; font-family:monospace; cursor:pointer;">🚀 ONLINE UYGULAMA</button>`;
                                if (p.download) buttonsHtml += `<a href="${p.download}" target="_blank" style="display:inline-block; margin-top:10px; padding:8px 16px; background:#000; color:#fff; text-decoration:none; border-radius:6px; font-size:12px; font-family:monospace;">⬇️ İNDİR</a>`;
                                if (p.link && !p.online_app && !p.download) buttonsHtml += `<a href="${p.link}" target="_blank" style="display:inline-block; margin-top:10px; padding:8px 16px; background:#ff4500; color:#fff; text-decoration:none; border-radius:6px; font-size:12px; font-family:monospace;">📁 GİTHUB</a>`;
                                finalHtml += `<div style="margin-bottom: 30px; padding:20px; background:rgba(255,69,0,0.03); border-left:3px solid #ff4500; border-radius:8px;">
                                    <h3 style="color:#000; margin: 0 0 10px 0; font-family: monospace;">> ${p.name.toUpperCase()}</h3>
                                    <p style="color:#333; margin: 0 0 15px 0; line-height: 1.6; font-size: 14px;">${p.description}</p>
                                    <small style="color:#ff4500; font-family: monospace; opacity: 0.8; font-weight: bold; display:block; margin-bottom:10px;">[ ${p.tech.join(' | ')} ]</small>
                                    <div>${buttonsHtml}</div>
                                </div>`;
                            });
                        } else finalHtml = `<pre style="white-space:pre-wrap; font-family:monospace; color:#333;">${text}</pre>`;
                        typeWriter(contentArea, finalHtml);
                    } catch (e) { contentArea.innerHTML = `<h1>Hata</h1><p>Dosya bulunamadı.</p>`; }
                }

                // --- 3. EVENT LISTENERS ---
                document.querySelectorAll('.nav-link').forEach(link => {
                    link.onclick = () => {
                        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                        link.classList.add('active'); loadPage(link.dataset.page);
                    };
                    link.onmouseenter = () => { codeStream.classList.add('active'); };
                    link.onmouseleave = () => { codeStream.classList.remove('active'); };
                });

                document.getElementById('close-btn').onclick = () => {
                    pageContent.classList.remove('active'); setTimeout(() => pageContent.style.display = 'none', 800);
                    updateText("XGOETIA"); document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                };

                document.querySelectorAll('.lang-link').forEach(link => link.onclick = () => {
                    document.querySelectorAll('.lang-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active'); currentLang = link.dataset.lang;
                    
                    updateMenuText();
                    const activeLink = document.querySelector('.nav-link.active');
                    if (activeLink && pageContent.classList.contains('active')) loadPage(activeLink.dataset.page);
                });

                // PRO TOOLS FUNCTIONS
                window.optimizeImage = function() {
                    const input = document.getElementById('img-upload');
                    const result = document.getElementById('img-result');
                    if (!input.files[0]) return alert("Lütfen bir görsel seçin!");
                    
                    result.style.display = 'block';
                    result.innerHTML = "WASM Engine Processing... ⚙️";
                    
                    setTimeout(() => {
                        const originalSize = (input.files[0].size / 1024).toFixed(2);
                        const optimizedSize = (originalSize * 0.4).toFixed(2); // %60 reduction
                        result.innerHTML = `✅ BAŞARILI!<br>Orijinal: ${originalSize} KB<br>Optimize Edilmiş: ${optimizedSize} KB<br><strong>Kazanç: %60</strong><br><a href="#" style="color:#ff4500;">[ İNDİR ]</a>`;
                    }, 1500);
                };

                window.analyzeSEO = function() {
                    const url = document.getElementById('url-input').value;
                    const result = document.getElementById('seo-result');
                    if (!url) return alert("Lütfen bir URL girin!");
                    
                    result.style.display = 'block';
                    result.innerHTML = "Analiz Motoru Çalışıyor... 🔍";
                    
                    setTimeout(() => {
                        result.innerHTML = `
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                                <div><strong>Hız:</strong> 0.8s (A+)</div>
                                <div><strong>SEO Skoru:</strong> %94</div>
                                <div><strong>SSL:</strong> Güvenli</div>
                                <div><strong>Mobil:</strong> Uyumlu</div>
                            </div>
                            <p style="margin-top:10px; font-size:11px; color:#ff4500;">* Tavsiye: H1 etiketleri optimize edilmeli.</p>
                        `;
                    }, 2000);
                };

                window.selectAllApps = function(select) {
                    const checkboxes = document.querySelectorAll('#apps-list input[type="checkbox"][data-idx]');
                    checkboxes.forEach(cb => cb.checked = select);
                    if (window.updateSelection) window.updateSelection();
                    const count = select ? checkboxes.length : 0;
                    const countEl = document.getElementById('selected-count');
                    if (countEl) countEl.textContent = count + ' SEÇİLDİ';
                };

                // generateBundleScript removed - using bundler-enhanced.js instead
                // window.generateBundleScript is defined in bundler-enhanced.js

                let isDragging = false, dx, dy;
                pageContent.onmousedown = (e) => { if (e.target.closest('a') || e.target.closest('button') || e.target.id === 'close-btn') return; isDragging = true; dx = e.clientX - pageContent.offsetLeft; dy = e.clientY - pageContent.offsetTop; pageContent.style.transition = 'none'; };
                window.onmousemove = (e) => { if (isDragging) { pageContent.style.right = 'auto'; pageContent.style.left = (e.clientX - dx) + 'px'; pageContent.style.top = (e.clientY - dy) + 'px'; pageContent.style.transform = 'none'; } };
                window.onmouseup = () => { isDragging = false; pageContent.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)'; };

                // --- 4. ANIMATION LOOP ---
                let animationRunning = true;
                function animate() {
                    if (!animationRunning || !system) {
                        return;
                    }
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    let rx = 0.0, ry = 0.0, rw = 0.0, rh = 0.0;
                    if (pageContent.classList.contains('active')) { 
                        const rect = pageContent.getBoundingClientRect(); 
                        rx = parseFloat(rect.left); 
                        ry = parseFloat(rect.top); 
                        rw = parseFloat(rect.width); 
                        rh = parseFloat(rect.height); 
                    }
                    try { 
                        system.update(mouseX, mouseY, 100.0, rx, ry, rw, rh); 
                    } catch(e) {
                        console.error('Update error:', e);
                    }
                    
                    // Güncel sayıyı al ve tüm parçacıkları çiz
                    try {
                        const count = system.get_count();
                        const xs = new Float64Array(memory.buffer, system.get_xs_ptr(), count);
                        const ys = new Float64Array(memory.buffer, system.get_ys_ptr(), count);
                        const rs = new Float64Array(memory.buffer, system.get_radii_ptr(), count);
                        ctx.fillStyle = '#ff4500';
                        for (let i = 0; i < count; i++) {
                            if (xs[i] > -999 && ys[i] > -999) { // Geçerli parçacıkları çiz
                                ctx.beginPath(); 
                                ctx.arc(xs[i], ys[i], rs[i], 0, Math.PI * 2); 
                                ctx.fill();
                            }
                        }
                    } catch(e) {
                        console.error('Render error:', e);
                    }
                    if (animationRunning) {
                        requestAnimationFrame(animate);
                    }
                }
                animate();
                updateMenuText();
            } catch (e) { console.error(e); }
        }
        run();
    </script>
    <script src="bundler-enhanced.js"></script>
    <script>
        // Online App Launcher functions
        window.openApp = function(url, name) {
            const modal = document.getElementById('app-modal');
            const frame = document.getElementById('app-frame');
            const closeBtn = document.getElementById('app-modal-close');
            
            frame.src = url;
            modal.style.display = 'block';
            
            closeBtn.onclick = function() {
                modal.style.display = 'none';
                frame.src = 'about:blank';
            };
            
            // Arka plana tıklayınca kapat
            modal.onclick = function(e) {
                if (e.target === modal) {
                    modal.style.display = 'none';
                    frame.src = 'about:blank';
                }
            };
        };
        
        window.closeApp = function() {
            const modal = document.getElementById('app-modal');
            const frame = document.getElementById('app-frame');
            modal.style.display = 'none';
            frame.src = 'about:blank';
        };
    </script>
</body>
