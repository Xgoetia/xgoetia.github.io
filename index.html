<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popcik - Installer Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #00ffa3;
            --primary-dark: #00d689;
            --bg: #ffffff;
            --text: #1a1d1f;
            --border: #edf2f7;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        /* VARSAYILAN İMLECİ GÖSTER */
        * { cursor: auto !important; -webkit-user-select: none; user-select: none; }
        html, body { cursor: auto !important; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #f4f7f6 100%);
            cursor: auto !important;
        }

        /* CANLI ARKA PLAN */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 1; pointer-events: none; }

        /* CAM KÜRE (Farenin Yanında Takip Eden) */
        #custom-cursor { 
            width: 0px; height: 0px; 
            position: fixed; pointer-events: none; z-index: 10000;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1), inset 0 0 10px rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center;
            /* Hafif gecikmeli takip efekti */
            transition: width 0.3s cubic-bezier(0.19, 1, 0.22, 1), 
                        height 0.3s cubic-bezier(0.19, 1, 0.22, 1),
                        opacity 0.3s ease,
                        left 0.1s linear,
                        top 0.1s linear;
            transform: translate(15px, 15px); /* İmlecin sağ alt çaprazında durması için */
            opacity: 0;
        }
        #custom-cursor img {
            width: 70%; height: 70%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            border-radius: 50%;
        }
        
        /* UYGULAMA ÜZERİNE GELİNDİĞİNDE KÜRE BELİRSİN */
        body.cursor-active #custom-cursor {
            width: 55px; height: 55px;
            opacity: 1;
            background: rgba(255, 255, 255, 0.4);
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(0, 255, 163, 0.3);
        }
        body.cursor-active #custom-cursor img {
            opacity: 1;
        }

        /* DİL SEÇİCİ */
        .lang-switch {
            position: fixed; top: 30px; right: 30px; z-index: 10000;
            display: flex; gap: 10px;
        }
        .lang-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #1a1d1f; padding: 8px 15px; border-radius: 50px;
            font-size: 0.7rem; font-weight: 900; letter-spacing: 2px;
            cursor: pointer !important; transition: all 0.3s;
        }
        .lang-btn:hover, .lang-btn.active {
            background: var(--primary); color: #000; border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 163, 0.3);
        }

        /* ANA KONTEYNIR */
        .container { width: 98%; max-width: 1600px; margin: 0 auto; padding: 40px 10px; position: relative; z-index: 10; }

        /* 4-COLUMN MASONRY GRID */
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; width: 100%; align-items: start; }
        @media (max-width: 1250px) { .app-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) { .app-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .app-grid { grid-template-columns: 1fr; } }

        /* KATEGORİ KARTI */
        .category {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border: 1px solid var(--border); padding: 25px; border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: var(--card-shadow);
            cursor: grab !important;
        }
        .category:active { cursor: grabbing !important; }
        .category.sortable-ghost { opacity: 0.4; transform: scale(0.95); border: 2px dashed var(--primary); }
        .category:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 40px rgba(0, 255, 163, 0.1); }
        .category h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #718096; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; pointer-events: none; }

        /* UYGULAMA MADDESİ */
        .app-item { padding: 12px; display: flex; align-items: center; gap: 15px; border-radius: 12px; transition: all 0.2s; cursor: pointer !important; }
        .app-item * { cursor: pointer !important; }
        .app-item:hover { background: rgba(0, 255, 163, 0.08); transform: translateX(5px); }
        .app-item label { font-weight: 600; font-size: 0.95rem; }
        .app-item input { appearance: none; width: 20px; height: 20px; border: 2px solid #cbd5e0; border-radius: 6px; margin-right: 5px; position: relative; }
        .app-item input:checked { background: var(--primary-dark); border-color: var(--primary-dark); }
        .app-item input:checked::after { content: '✓'; position: absolute; color: white; font-size: 14px; left: 3px; top: -1px; }

        /* BAŞLIK - ABARTILI MODERN TASARIM */
        header { text-align: center; margin-bottom: 100px; padding-top: 60px; perspective: 2000px; position: relative; }
        
        .main-title {
            font-size: 10rem; font-weight: 950; text-transform: uppercase; letter-spacing: 15px;
            margin: 0; position: relative; display: inline-block; 
            color: #f0f4f8;
            background: linear-gradient(135deg, 
                #ffffff 0%, 
                #e0f2f7 20%, 
                #b3e5fc 40%, 
                #ffffff 50%, 
                #e1f5fe 60%, 
                #b3e5fc 80%, 
                #ffffff 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8)) drop-shadow(0 10px 30px rgba(0, 191, 255, 0.3));
            animation: diamond-shine 4s linear infinite, title-float 6s ease-in-out infinite alternate;
            cursor: pointer !important;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .main-title::before {
            content: 'POPCIK';
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.5);
            -webkit-text-fill-color: transparent;
            transform: translateZ(20px);
            z-index: 2;
            opacity: 0.5;
        }

        .main-title:hover {
            transform: scale(1.1) rotateX(20deg) rotateY(-15deg);
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 1)) drop-shadow(0 0 50px rgba(0, 191, 255, 0.5));
            letter-spacing: 30px;
        }

        @keyframes diamond-shine {
            to { background-position: 200% center; }
        }

        @keyframes title-float {
            0% { transform: translateY(0) rotateX(5deg); }
            100% { transform: translateY(-20px) rotateX(-5deg); }
        }

        /* ELMAS PARILTISI EFEKTİ */
        .main-title::after {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(60deg, transparent 45%, rgba(255,255,255,0.8) 50%, transparent 55%);
            background-size: 300% 100%;
            animation: prism-sweep 3s infinite;
            -webkit-background-clip: text;
            background-clip: text;
            pointer-events: none;
        }

        @keyframes prism-sweep {
            0% { background-position: -150% 0; }
            100% { background-position: 150% 0; }
        }

        .title-meta { 
            font-size: 13px; letter-spacing: 12px; color: #1a1d1f; font-weight: 900; 
            margin-top: 30px; text-transform: uppercase; position: relative;
            background: rgba(0, 255, 163, 0.1); padding: 8px 30px; border-radius: 50px;
            display: inline-block;
        }

        /* FOOTER ACTION */
        .footer-action { position: fixed; bottom: 40px; right: 40px; z-index: 1000; animation: float-btn 4s ease-in-out infinite; }
        @keyframes float-btn { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(2deg); } }

        .download-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #000;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 22px 60px;
            font-size: 0.9rem;
            font-weight: 900;
            border-radius: 100px;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05), inset 0 0 20px rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
            position: relative;
            cursor: pointer !important;
        }
        .download-btn::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(45deg); transition: 0.6s; pointer-events: none;
        }
        .download-btn:hover {
            background: rgba(0, 255, 163, 0.2);
            border-color: var(--primary);
            transform: scale(1.1);
            box-shadow: 0 20px 60px rgba(0, 255, 163, 0.3);
            color: #000;
        }
        .download-btn:hover::before { left: 100%; }
        .download-btn:active { transform: scale(0.95); }
    </style>
</head>

            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`);
            if (activeBtn) activeBtn.classList.add('active');
            
            // ANA BUTON VE MODAL METİNLERİ
            document.getElementById('dlBtn').innerText = `${translations[lang].startInstall} ${document.querySelectorAll('input:checked').length}`;
            document.querySelector('#setupModal p').innerText = translations[lang].statusAnalyzing;
            document.querySelector('#setupModal button').innerText = translations[lang].closeReturn;

            // MODAL SEÇENEKLERİNİ GÜNCELLE
            const modalCats = document.querySelectorAll('#setupModal .category');
            if (modalCats.length >= 2) {
                const cmdTitle = modalCats[0].querySelector('h3');
                const cmdDesc = modalCats[0].querySelector('p');
                const vbsTitle = modalCats[1].querySelector('h3');
                const vbsDesc = modalCats[1].querySelector('p');

                if (lang === 'tr') {
                    cmdTitle.innerText = "CMD CORE";
                    cmdDesc.innerHTML = "Klasik Komut İstemi.<br>Hızlı ve güvenilir.";
                    vbsTitle.innerText = "SILENT VBS";
                    vbsDesc.innerHTML = "Sessiz Mod.<br>Pencere açılmaz.";
                } else {
                    cmdTitle.innerText = "CMD CORE";
                    cmdDesc.innerHTML = "Classic Command Prompt.<br>Fast and reliable.";
                    vbsTitle.innerText = "SILENT VBS";
                    vbsDesc.innerHTML = "Silent Mode.<br>No window opens.";
                }
            }
            
            // KATEGORİ BAŞLIKLARINI TÜM SAYFADA GÜNCELLE
            const catHeaders = document.querySelectorAll('.category h3');
            catHeaders.forEach(h => {
                const trKey = Object.keys(translations.tr.categories).find(key => 
                    translations.tr.categories[key] === h.innerText || translations.en.categories[key] === h.innerText
                );
                if (trKey) h.innerText = translations[lang].categories[trKey];
            });
        }

        const grid = document.getElementById('mainGrid');
        Object.entries(apps).forEach(([cat, list]) => {
            const div = document.createElement('div');
            div.className = 'category';
            div.innerHTML = `<h3>${cat}</h3>${list.map(app => `
                <div class="app-item">
                    <input type="checkbox" id="${app}" value="${app}">
                    <label for="${app}">${app}</label>
                </div>
            `).join('')}`;
            grid.appendChild(div);
        });

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            points = [];
            for (let i = 0; i < 70; i++) points.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*1.2, vy: (Math.random()-0.5)*1.2});
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = 'rgba(0, 255, 163, 0.3)'; ctx.fillStyle = 'rgba(0, 255, 163, 0.4)';
            points.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx*=-1; if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
                for(let j=i+1; j<points.length; j++) {
                    let p2 = points[j]; let d = Math.hypot(p.x-p2.x, p.y-p2.y);
                    if(d<180) { ctx.lineWidth = 1-(d/180); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p2.x,p2.y); ctx.stroke(); }
                }
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init); init(); draw();

        const cursor = document.getElementById('custom-cursor');
        const cursorImg = document.getElementById('cursor-logo-img');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px'; 
            cursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('mouseover', e => {
            const appItem = e.target.closest('.app-item');
            if (appItem) {
                const appName = appItem.querySelector('label').innerText;
                cursorImg.src = getIcon(appName);
                document.body.classList.add('cursor-active');
            } else if (e.target.closest('.category, button')) {
                document.body.classList.add('cursor-active');
            }
        });

        document.addEventListener('mouseout', e => {
            if (e.target.closest('.app-item, .category, button')) {
                cursorImg.src = "";
                document.body.classList.remove('cursor-active');
            }
        });

        const btn = document.getElementById('dlBtn');
        document.addEventListener('change', () => {
            const count = document.querySelectorAll('input:checked').length;
            btn.innerText = `${translations[currentLang].startInstall} ${count}`;
        });

        btn.onclick = () => {
            const selected = document.querySelectorAll('input:checked');
            if (selected.length === 0) return alert(translations[currentLang].errorNoSelection);
            
            const listDiv = document.getElementById('selectedAppsList');
            listDiv.innerHTML = Array.from(selected).map(i => `<div style="padding:6px 12px; font-weight:700; font-size:0.65rem; background:#fff; border-radius:100px; border:1px solid #edf2f7; color:#4a5568;">${i.value}</div>`).join('');
            
            const modal = document.getElementById('setupModal');
            modal.style.display = 'flex';
            setTimeout(() => { modal.children[0].style.transform = 'scale(1)'; modal.children[0].style.opacity = '1'; }, 10);
            document.body.style.overflow = 'hidden';
        };

        function closeModal() {
            const modal = document.getElementById('setupModal');
            modal.children[0].style.transform = 'scale(0.8)';
            modal.children[0].style.opacity = '0';
            setTimeout(() => { modal.style.display = 'none'; document.body.style.overflow = 'auto'; }, 300);
        }

        function generateScript(type) {
            const selected = Array.from(document.querySelectorAll('input:checked')).map(i => i.value);
            let content = "";
            let fileName = "";

            if (type === 'winget-cmd') {
                content = "@echo off\r\necho POPCIK - KURULUM BASLATILIYOR...\r\ncolor 0a\r\n";
                selected.forEach(name => {
                    const id = appMap[name] || name.toLowerCase().replace(/[^a-z0-9\.]/g, '');
                    if (id.includes("/") || id.includes("\\")) {
                        content += `echo [LOCAL] "${name}"...\r\n"${id}" /S\r\n`;
                    } else {
                        content += `echo [YUKLENIYOR] "${name}"...\r\nwinget install --id "${id}" --silent --accept-package-agreements --accept-source-agreements --force\r\n`;
                    }
                });
                content += "pause";
                fileName = "popcik_kurulum.cmd";
            } else if (type === 'vbs') {
                content = "Set objShell = CreateObject(\"WScript.Shell\")\r\n";
                selected.forEach(name => {
                    const id = appMap[name] || name.toLowerCase().replace(/[^a-z0-9\.]/g, '');
                    if (id.includes("/") || id.includes("\\")) {
                        content += `objShell.Run \"\"\"${id}\"\" /S\", 0, True\r\n`;
                    } else {
                        content += `objShell.Run \"winget install --id \"\"${id}\"\" --silent --accept-package-agreements --accept-source-agreements --force\", 0, True\r\n`;
                    }
                });
                content += "MsgBox \"Kurulum tamamlandı.\", 64, \"Popcik\"";
                fileName = "popcik_kurulum.vbs";
            }

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = fileName; a.click();
        }

        new Sortable(grid, { animation: 350, ghostClass: 'sortable-ghost' });
        window.addEventListener('load', () => setLang('tr'));
    </script>
</body>
</html>
